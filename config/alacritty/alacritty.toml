[colors.cursor]
cursor = "#f5e0dc"
text = "#f5e0dc"

[colors.primary]
background = "#111111"
foreground = "#cdd6f4"

[colors.selection]
background = "#f5c2e7"
text = "#1e1e2e"

[font]
size = 9 

[font.normal]
family = "monospace"
style = "Medium"

[window]
decorations = "none"
opacity = 0.9

[window.padding]
x = 0
y = 0

[terminal]
osc52 = "copypaste"  # "none", "read", "write", "both"
shell = { program = "/bin/zsh", args = ["-l"] }

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[keyboard]
bindings = [
    { key = "N", mods = "Control|Shift", action = "SpawnNewInstance" },
    { key = "PageUp", mods = "Shift", action = "ScrollPageUp" },
    { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
    { key = "V", mods = "Control|Shift", action = "Paste" },
    { key = "C", mods = "Control|Shift", action = "Copy" },
]

[cursor]
style = "Beam"  # "Block", "Underline", "Beam"
unfocused_hollow = true
blink_interval = 750
blink_timeout = 55
