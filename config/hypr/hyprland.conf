# --- General ---
general {
    gaps_in = 10
    gaps_out = 15
    border_size = 2
    col.active_border = rgba(88c0d0ff)
    col.inactive_border = rgba(4c566aff)
    layout = dwindle
}

# --- Monitor ---
monitor = , preferred, auto, 1

# --- Misc ---
misc {
    focus_on_activate = true
}

# --- Keybindings ---
bind = SUPER, Return, exec, alacritty
bind = SUPER, e, exec, rofi -show drun -theme "~/theme.rasi"
bind = SUPER, r, exec, "dmenu_run -m 0 -fn monospace:size=10 -nb #222222 -nf #222222 -sb #5115e8 -sf #eeeeee"
bind = SUPER, q, killactive
bind = SUPER SHIFT, E, exec, hyprctl dispatch exit
bind = SUPER, F, fullscreen, 1        # maximiza (respeta waybar)
bind = SUPER SHIFT, F, fullscreen, 0  # pantalla completa total

# --- Workspace keybinds ---
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6


# --- Animations ---
animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 3, myBezier, slide
    animation = fade, 1, 3, default
    animation = workspaces, 1, 5, default, slidevert
}

# --- Layouts ---
dwindle {
    pseudotile = true
    preserve_split = true
}

input {
    kb_layout = es
    kb_variant =        # déjalo vacío para español estándar
    kb_model = pc105
    kb_options =        # opciones extra, ej: "eurosign:e"

    follow_mouse = 1
    sensitivity = 0     # sensibilidad del ratón, -1.0 a 1.0
}

exec-once = waybar
#exec-once = eww daemon && eww open left-widgets && eww open right-widgets
exec-once = hyprpaper
